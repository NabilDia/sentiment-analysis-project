# ============================================================
# Sentiment Analysis Project – Logging Configuration
# ============================================================
# Follows the Python logging.config.dictConfig schema.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  simple:
    format: "%(levelname)s: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    encoding: utf-8

root:
  level: DEBUG
  handlers: [console, file]

loggers:
  src:
    level: DEBUG
    handlers: [console, file]
    propagate: false
